<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orbital Glass CTA</title>
  <style>
    :root {
      --bg-a: #030712;
      --bg-b: #0b1022;
      --cyan: #46e8ff;
      --blue: #4f7cff;
      --violet: #b36dff;
      --text: #e9f6ff;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      display: grid;
      place-items: center;
      overflow: hidden;
      color: var(--text);
      font-family: ui-sans-serif, -apple-system, Segoe UI, Roboto, Inter, Helvetica, Arial, sans-serif;
      background:
        radial-gradient(1200px 800px at 80% -10%, #243b8f44 0%, transparent 60%),
        radial-gradient(900px 700px at 10% 110%, #6b21a833 0%, transparent 58%),
        linear-gradient(145deg, var(--bg-b), var(--bg-a));
    }

    .stage {
      width: min(92vw, 980px);
      min-height: min(88vh, 760px);
      border-radius: 32px;
      position: relative;
      display: grid;
      place-items: center;
      isolation: isolate;
    }

    .orb-wrap {
      position: relative;
      width: min(68vw, 560px);
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      filter: saturate(1.08);
    }

    .orb {
      width: 60%;
      aspect-ratio: 1;
      border-radius: 50%;
      position: relative;
      background:
        radial-gradient(circle at 28% 23%, #ffffffd9 0 7%, #ffffff00 23%),
        radial-gradient(circle at 35% 31%, #8ef2ff 0 12%, #37a8ff 34%, #2f6fff 59%, #261e58 100%),
        radial-gradient(circle at 70% 68%, #6be6ff44 0 22%, #00000000 58%),
        radial-gradient(circle at 55% 52%, #ffffff20 0 48%, #00000000 66%);
      box-shadow:
        0 0 26px #66eeff99,
        0 0 82px #4f8aff66,
        0 0 180px #7f4dff45;
      animation: orb-breathe 4.2s ease-in-out infinite;
      transform-style: preserve-3d;
    }

    .orb::before,
    .orb::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 50%;
      pointer-events: none;
    }

    .orb::before {
      background:
        radial-gradient(circle at 26% 24%, #ffffffaa 0 10%, #ffffff00 28%),
        radial-gradient(circle at 72% 74%, #9defff2b 0 17%, #0000 44%);
      mix-blend-mode: screen;
      animation: orb-drift 6.4s ease-in-out infinite;
    }

    .orb::after {
      background:
        conic-gradient(from 0deg, #0000, #6cf0ff33, #0000, #8f5dff2e, #0000);
      filter: blur(1px);
      animation: caustic-spin 10s linear infinite;
      opacity: .8;
    }

    .ring {
      position: absolute;
      width: 88%;
      aspect-ratio: 1;
      border-radius: 50%;
      border: 1.5px solid #a5f4ff55;
      box-shadow: inset 0 0 12px #72dfff3d, 0 0 14px #68e7ff33;
      animation: ring-rotate-1 13s linear infinite;
      transform: rotateX(74deg) rotateY(12deg);
    }

    .ring.r2 {
      width: 95%;
      border-color: #c084fc4f;
      box-shadow: inset 0 0 12px #c084fc36, 0 0 14px #c084fc30;
      animation: ring-rotate-2 17s linear infinite;
      transform: rotateX(66deg) rotateY(-14deg);
    }

    .ring::before {
      content: "";
      position: absolute;
      width: 12px;
      aspect-ratio: 1;
      border-radius: 50%;
      top: 50%;
      left: -6px;
      translate: 0 -50%;
      background: #dffbff;
      box-shadow: 0 0 12px #7fe9ff, 0 0 22px #7fe9ff;
    }

    .cta {
      position: absolute;
      bottom: 9%;
      left: 50%;
      translate: -50% 0;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      border: 1px solid #c9f6ff42;
      color: #f2fbff;
      background: linear-gradient(180deg, #ffffff19, #ffffff08);
      backdrop-filter: blur(12px) saturate(1.25);
      -webkit-backdrop-filter: blur(12px) saturate(1.25);
      border-radius: 999px;
      padding: 14px 20px;
      font-weight: 650;
      letter-spacing: .2px;
      text-decoration: none;
      box-shadow:
        0 0 0 1px #ffffff1f inset,
        0 10px 22px #04081488,
        0 0 16px #57d9ff45;
      transition: transform .4s cubic-bezier(0.34,1.56,0.64,1), box-shadow .35s ease, border-color .35s ease;
      isolation: isolate;
      overflow: hidden;
    }

    .cta::before {
      content: "";
      position: absolute;
      inset: 1px;
      border-radius: inherit;
      pointer-events: none;
      background: linear-gradient(180deg, #ffffff2b 0%, #ffffff08 48%, #0000 100%);
    }

    .cta::after {
      content: "";
      position: absolute;
      top: -10%;
      left: -42%;
      width: 36%;
      height: 120%;
      transform: translateX(0) skewX(-20deg);
      background: linear-gradient(90deg, #ffffff00, #ffffff66, #ffffff00);
      filter: blur(0.2px);
      transition: transform .72s ease;
      pointer-events: none;
    }

    .cta:hover {
      transform: translateY(-2px) scale(1.05);
      border-color: #b7fbff9e;
      box-shadow:
        0 0 0 1px #d8faff3f inset,
        0 16px 32px #050b1aa0,
        0 0 26px #57d9ff7a;
    }

    .cta:hover::after { transform: translateX(420%) skewX(-20deg); }
    .cta:active { transform: translateY(1px) scale(0.985); }

    .micro-orb {
      width: 14px;
      aspect-ratio: 1;
      border-radius: 50%;
      background:
        radial-gradient(circle at 28% 25%, #fff 0 24%, #8df4ff 38%, #4c8eff 80%, #25124e 100%);
      box-shadow: 0 0 8px #7ceaff, 0 0 18px #4b8dff66;
      animation: micro-pulse 2.3s ease-in-out infinite;
      flex: 0 0 auto;
    }

    .label { position: absolute; top: 7%; text-align: center; opacity: .9; }
    .label h1 { margin: 0; font-size: clamp(20px, 3.2vw, 34px); letter-spacing: .2px; }
    .label p { margin: 6px 0 0; color: #d0e8ff; font-size: clamp(12px, 1.6vw, 15px); opacity: .9; }

    @keyframes orb-breathe {
      0%, 100% { transform: scale(1) translateY(0); box-shadow: 0 0 26px #66eeff99, 0 0 82px #4f8aff66, 0 0 180px #7f4dff45; }
      50% { transform: scale(1.035) translateY(-4px); box-shadow: 0 0 30px #74f0ffb0, 0 0 108px #63a0ff7b, 0 0 220px #8f5dff59; }
    }
    @keyframes orb-drift {
      0%, 100% { transform: translateX(0) translateY(0) rotate(0deg); opacity: .9; }
      50% { transform: translateX(4px) translateY(-3px) rotate(8deg); opacity: .72; }
    }
    @keyframes caustic-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg);} }
    @keyframes ring-rotate-1 { from { transform: rotateX(74deg) rotateY(12deg) rotateZ(0deg);} to { transform: rotateX(74deg) rotateY(12deg) rotateZ(360deg);} }
    @keyframes ring-rotate-2 { from { transform: rotateX(66deg) rotateY(-14deg) rotateZ(360deg);} to { transform: rotateX(66deg) rotateY(-14deg) rotateZ(0deg);} }
    @keyframes micro-pulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 8px #7ceaff, 0 0 18px #4b8dff66; }
      50% { transform: scale(1.14); box-shadow: 0 0 10px #8af0ff, 0 0 24px #6aa9ff88; }
    }

    @media (max-width: 680px) {
      .orb { width: 67%; }
      .ring { width: 98%; }
      .cta { bottom: 6%; }
    }
  </style>
</head>
<body>
  <div class="stage">
    <div class="label">
      <h1>Orbital Glass CTA</h1>
      <p>Single-file CSS orb system with glass interaction button</p>
    </div>

    <div class="orb-wrap" aria-label="Animated Orb Showcase">
      <div class="ring"></div>
      <div class="ring r2"></div>
      <div class="orb"></div>
    </div>

    <a class="cta" href="#" aria-label="Launch">
      <span class="micro-orb" aria-hidden="true"></span>
      <span>Launch Experience</span>
    </a>
  </div>
</body>
</html>
